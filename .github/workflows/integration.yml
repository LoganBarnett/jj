name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    # Five-minute Jenkins startup + ~two-minute test suite, plus Nix and Cargo
    # build time.  Thirty minutes is generous but prevents hung jobs from
    # blocking indefinitely.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      # Install Nix and restore/save the /nix store cache via the template's
      # blessed composite action.  It replaces the shut-down Determinate
      # nix-installer + magic-nix-cache pair this job used to carry by hand;
      # consuming it at @main means future nix-CI fixes reach jj without
      # another hand-patch.  The 55 Jenkins plugin derivations land in the
      # cached store.
      - uses: LoganBarnett/rust-template/.github/actions/setup-nix@main

      # Caches ~/.cargo and target/ — orthogonal to the Nix store cache above.
      - uses: Swatinem/rust-cache@v2

        # `nix develop --command` runs the dev-shell hook (which symlinks
        # Jenkins plugins and exports JENKINS_HOME / CASC_JENKINS_CONFIG /
        # JAVA_OPTS) and then executes the script.  Everything — Jenkins
        # startup, API-token generation, cargo build, and cargo test — lives
        # in the script to avoid quoting gymnastics in YAML.
      - name: Start Jenkins and run integration tests
        run: nix develop --command bash .github/scripts/run-tests.sh
